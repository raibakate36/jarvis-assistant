<!DOCTYPE html>
<html>
<head>
    <title>Jarvis Chat</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <h1>Jarvis Chat</h1>

    <p>Hello Raiba! Ask me anything.</p>

    <div id="chatArea"></div>

    <input id="messageBox" type="text" placeholder="Ask Jarvis anything...">

    <button id="sendBtn">Send</button>

    <script>
    const chatArea = document.getElementById("chatArea");
    document.getElementById("sendBtn").onclick = async function () {

    let message = document.getElementById("messageBox").value;

    if (message.trim() === "") return;

    // Show user's message immediately
   chatArea.innerHTML +=
        "<div class='user-message'>You: " + message + "</div>";

    // Clear the textbox immediately
    document.getElementById("messageBox").value = "";

    try {
        console.time("Total")
        let response = await fetch("/get_response", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: message
            })
        });
        console.timeLog("Total", "Response received");
        let data = await response.json();


        console.timeEnd("Total");

        // Show Jarvis's reply when it arrives
        chatArea.innerHTML +=
            "<div class='jarvis-message'>Jarvis: " + data.reply + "</div>";

        // Automatically scroll to the latest message
        chatArea.scrollTop =
            chatArea.scrollHeight;

    } catch (error) {

        chatArea.innerHTML +=
            "<div class='jarvis-message'>Jarvis: Something went wrong.</div>";

        console.error(error);
    }
};

document.getElementById("messageBox").addEventListener("keydown", function (event) {
    if (event.key === "Enter") {
        document.getElementById("sendBtn").click();
    }
});
</script>

</body>
</html>
